<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Professional Photo Collage App</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body>
    <div class="toast-container position-fixed top-0 end-0 p-3">
      <div
        id="successToast"
        class="toast align-items-center text-white bg-success border-0"
        role="alert"
      >
        <div class="d-flex">
          <div class="toast-body">✅ Download berhasil</div>

          <button
            type="button"
            class="btn-close btn-close-white me-2 m-auto"
            data-bs-dismiss="toast"
          ></button>
        </div>
      </div>
    </div>

<main class="container py-5">
  <header class="text-center mb-5">
    <div class="logo-container mb-4">
      <img
        id="header-logo"
        src="assets/images/logo.png"
        alt="Logo"
        class="header-logo"
      />
    </div>


    <div class="info-card mx-auto">
      
    <div class="d-flex justify-content-center mb-4">
      <select id="logoSelector" class="form-select logo-select">
        <option value="assets/images/logo.png">Logo Default</option>
        <option value="assets/images/tni.png">Logo TNI</option>
        <option value="assets/images/disinfolahtad.png">
          Logo Disinfolahtad
        </option>
      </select>
    </div>

    <div class="d-flex justify-content-center mb-4">
      <select id="backgroundSelector" class="form-select logo-select">
        <option value="assets/images/background-1.png">Background 1</option>
        <option value="assets/images/background-2.png">Background 2</option>
        <option value="assets/images/background-3.png">Background 3</option>
        <option value="assets/images/background-4.png">Background 4</option>
      </select>
    </div>
      <div class="mb-3">
        <input
          type="text"
          id="activity-title"
          class="form-control info-input"
          placeholder="Masukkan Judul Kegiatan"
        />
      </div>

      <div>
        <input
          type="date"
          id="activity-date"
          class="form-control info-input"
          placeholder="Masukkan Tanggal Kegiatan"
        />
      </div>
    </div>
  </header>

  <section class="upload-panel">
    <div class="instruction-box">
      <h2 class="section-title">Upload Foto</h2>

      <p>
        Tekan <kbd>CTRL + V</kbd> untuk paste gambar atau upload manual.
      </p>

      <div id="drop-zone" class="drop-zone mt-4">
        <p>Drop gambar di sini</p>
      </div>

      <input
        type="file"
        id="fileInput"
        accept="image/*"
        multiple
        hidden
      />

      <div class="d-flex justify-content-center gap-3 mt-4 flex-wrap">
        <button id="uploadBtn" class="btn btn-primary rounded-pill px-4">
          Upload Foto
        </button>

        <button id="resetBtn" class="btn btn-danger rounded-pill px-4">
          Reset
        </button>
      </div>

      <div class="mt-4 text-center">
        <span class="counter-text">
          Total Foto:
          <span id="photo-counter">0</span>
        </span>
      </div>
    </div>
  </section>

  <section class="collage-section mt-5">
    <div id="export-area">
      <div class="export-header text-center mb-4">
        <img
          id="export-logo"
          src="assets/images/logo.png"
          class="export-logo"
        />

        <div class="export-card mt-3">
          <h2 id="export-title">Judul Kegiatan</h2>

          <p id="export-date">Hari, Tanggal Bulan Tahun</p>
        </div>
      </div>

      <div id="collage-container" class="collage-base hidden"></div>
    </div>
  </section>

  <section
    class="action-section mt-5 text-center hidden"
    id="action-buttons"
  >
    <div class="d-flex justify-content-center gap-3 flex-wrap">
      <button
        id="downloadPNG"
        class="btn btn-success px-5 py-3 rounded-pill"
      >
        Download PNG
      </button>

      <button
        id="downloadJPG"
        class="btn btn-warning px-5 py-3 rounded-pill"
      >
        Download JPG
      </button>
    </div>

    <div id="loading-text" class="loading-text hidden mt-4">
      Menyiapkan gambar resolusi tinggi...
    </div>
  </section>
</main>    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="assets/js/ui.js"></script>
    <script src="assets/js/collage.js"></script>
    <script src="assets/js/download.js"></script>
    <script src="assets/js/image-optimizer.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
